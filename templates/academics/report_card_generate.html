{% extends 'base/base.html' %}
{% block title %}Generate Report Cards{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h3>Generate Report Cards</h3>
  </div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Class</label>
          <select name="class_id" class="form-select" required>
            <option value="">Select a class</option>
            {% for class in classes %}
            <option value="{{ class.pk }}">{{ class.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Term</label>
          <select name="term_id" class="form-select" required>
            <option value="">Select a term</option>
            {% for term in terms %}
            <option value="{{ term.pk }}">{{ term }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="d-flex justify-content-end">
        <a href="{% url 'academics:academic_report' %}" class="btn btn-secondary me-2">Cancel</a>
        <button type="submit" class="btn btn-primary">Generate Report Cards</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
