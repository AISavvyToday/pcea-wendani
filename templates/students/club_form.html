{% extends 'base/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="content-wrapper">
  <div class="page-header d-flex justify-content-between align-items-center mb-3">
    <h3 class="page-title mb-0">{{ title }}</h3>
    <a href="{% url 'students:club_list' %}" class="btn btn-outline-secondary btn-sm">Back to clubs</a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Name</label>
            {{ form.name }}
            {% if form.name.errors %}<div class="text-danger small mt-1">{{ form.name.errors }}</div>{% endif %}
          </div>
          <div class="col-md-6">
            <label class="form-label">Code</label>
            {{ form.code }}
          </div>
          <div class="col-md-6">
            <label class="form-label">Patron / Teacher in Charge</label>
            {{ form.patron_name }}
          </div>
          <div class="col-12">
            <label class="form-label">Description</label>
            {{ form.description }}
          </div>
        </div>
        <div class="d-flex justify-content-end gap-2 mt-3">
          <a href="{% url 'students:club_list' %}" class="btn btn-light">Cancel</a>
          <button type="submit" class="btn btn-primary">{{ button_text }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
